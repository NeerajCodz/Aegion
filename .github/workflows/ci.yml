# =============================================================================
# Aegion CI Pipeline
# Runs linting, testing, and coverage for Go and Rust code
# =============================================================================

name: CI

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

env:
  GO_VERSION: '1.23'
  RUST_VERSION: 'stable'
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Go Linting
  # ---------------------------------------------------------------------------
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted. Run 'gofmt -w .'"
            gofmt -d .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  # ---------------------------------------------------------------------------
  # Rust Linting
  # ---------------------------------------------------------------------------
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # Go Tests with Coverage
  # ---------------------------------------------------------------------------
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: go-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Rust (for CGO)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build Rust libraries
        working-directory: rust
        run: cargo build --release --workspace

      - name: Run tests with coverage
        env:
          CGO_ENABLED: 1
          CGO_LDFLAGS: "-L${{ github.workspace }}/rust/target/release"
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload Go coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: go
          name: go-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Rust Tests with Coverage
  # ---------------------------------------------------------------------------
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    needs: rust-lint
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload Rust coverage
        uses: codecov/codecov-action@v4
        with:
          files: rust/lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # CI Summary
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [go-lint, rust-lint, go-test, rust-test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.go-lint.result }}" != "success" ]] || \
             [[ "${{ needs.rust-lint.result }}" != "success" ]] || \
             [[ "${{ needs.go-test.result }}" != "success" ]] || \
             [[ "${{ needs.rust-test.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
