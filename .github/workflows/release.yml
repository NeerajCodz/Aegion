# =============================================================================
# Aegion Release Pipeline
# Builds release binaries and creates GitHub releases
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.23'
  RUST_VERSION: 'stable'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Build Release Binaries
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            rust_target: x86_64-unknown-linux-gnu
            artifact: aegion-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            rust_target: aarch64-unknown-linux-gnu
            artifact: aegion-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            rust_target: x86_64-apple-darwin
            artifact: aegion-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            rust_target: aarch64-apple-darwin
            artifact: aegion-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            rust_target: x86_64-pc-windows-msvc
            artifact: aegion-windows-amd64.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Rust libraries
        working-directory: rust
        run: cargo build --release --workspace --target ${{ matrix.rust_target }}

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CGO_LDFLAGS: "-L${{ github.workspace }}/rust/target/${{ matrix.rust_target }}/release"
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ matrix.artifact }} ./cmd/aegion

      - name: Create checksum
        shell: bash
        run: |
          if [[ "${{ matrix.goos }}" == "darwin" ]]; then
            shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          else
            sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  # ---------------------------------------------------------------------------
  # Build Release Docker Images
  # ---------------------------------------------------------------------------
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.core
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

  # ---------------------------------------------------------------------------
  # Generate Changelog
  # ---------------------------------------------------------------------------
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
        continue-on-error: true

      - name: Fallback changelog
        if: steps.changelog.outcome == 'failure'
        id: fallback
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-decorate HEAD)
          else
            COMMITS=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$COMMITS" | while read line; do
            echo "- $line" >> $GITHUB_OUTPUT
          done
          echo "EOF" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker, changelog]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          ls -la release/

      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'
          # Aegion ${{ steps.version.outputs.version }}

          ## Installation

          ### Binary
          Download the appropriate binary for your platform from the assets below.

          ### Docker
          ```bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ steps.version.outputs.version }}
          ```

          ### Helm
          ```bash
          helm repo add aegion https://aegion.github.io/charts
          helm install aegion aegion/aegion --version ${{ steps.version.outputs.version }}
          ```

          ## Checksums
          Each binary includes a `.sha256` checksum file. Verify your download:
          ```bash
          sha256sum -c aegion-linux-amd64.sha256
          ```

          ## Changelog
          ${{ needs.changelog.outputs.changelog }}

          ---
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.version }}...HEAD
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Aegion ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: release/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Post-Release Tasks
  # ---------------------------------------------------------------------------
  post-release:
    name: Post-Release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Release Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Assets" >> $GITHUB_STEP_SUMMARY
          echo "- aegion-linux-amd64" >> $GITHUB_STEP_SUMMARY
          echo "- aegion-linux-arm64" >> $GITHUB_STEP_SUMMARY
          echo "- aegion-darwin-amd64" >> $GITHUB_STEP_SUMMARY
          echo "- aegion-darwin-arm64" >> $GITHUB_STEP_SUMMARY
          echo "- aegion-windows-amd64.exe" >> $GITHUB_STEP_SUMMARY
