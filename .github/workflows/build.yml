# =============================================================================
# Aegion Build Pipeline
# Builds Docker images and pushes to registry
# =============================================================================

name: Build

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push images to registry'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Build Base Images
  # ---------------------------------------------------------------------------
  build-base:
    name: Build Base Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      base-tag: ${{ steps.meta-base.outputs.tags }}
      runtime-tag: ${{ steps.meta-runtime.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for base image
        id: meta-base
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/base
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for runtime image
        id: meta-runtime
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/base-runtime
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.base
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-base.outputs.tags }}
          labels: ${{ steps.meta-base.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.base-runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-runtime.outputs.tags }}
          labels: ${{ steps.meta-runtime.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Build Core Image
  # ---------------------------------------------------------------------------
  build-core:
    name: Build Core Image
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Prepare platform tag
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "tag=${platform//\//-}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.core
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ github.sha }}-${{ steps.platform.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Create Multi-Platform Manifest
  # ---------------------------------------------------------------------------
  create-manifest:
    name: Create Multi-Platform Manifest
    runs-on: ubuntu-latest
    needs: build-core
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ github.sha }}-linux-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ github.sha }}-linux-arm64

          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ github.sha }}

          # Tag with branch name
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${BRANCH_NAME} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ github.sha }}-linux-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ github.sha }}-linux-arm64

          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${BRANCH_NAME}

          # Tag as latest if main branch
          if [ "$BRANCH_NAME" = "main" ]; then
            docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:latest \
              ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ github.sha }}-linux-amd64 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:${{ github.sha }}-linux-arm64

            docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/core:latest
          fi

  # ---------------------------------------------------------------------------
  # Build Summary
  # ---------------------------------------------------------------------------
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-base, build-core, create-manifest]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Base | ${{ needs.build-base.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Core | ${{ needs.build-core.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
