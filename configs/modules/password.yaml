# =============================================================================
# password.yaml — Password Module Configuration
#
# Comprehensive configuration for the Password authentication module.
# Includes HIBP integration, complexity requirements, and password history.
# =============================================================================

# -----------------------------------------------------------------------------
# Module Metadata
# -----------------------------------------------------------------------------
module:
  name: password
  version: "1.0.0"
  description: "Password-based authentication module"

# ─────────────────────────────────────────────────────────────────────────────
# Enable/Disable Module
# ─────────────────────────────────────────────────────────────────────────────
enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# Password Complexity Requirements
# ─────────────────────────────────────────────────────────────────────────────
complexity:
  # Minimum password length (recommended: 8-12 for standard, 14+ for high security)
  min_length: 8
  
  # Maximum password length (prevent DoS via bcrypt)
  max_length: 72
  
  # Character class requirements
  require_uppercase: true
  require_lowercase: true
  require_number: true
  require_special: false  # Set true for high-security environments
  
  # Minimum number of character classes required (1-4)
  # Alternative to requiring specific classes
  min_character_classes: 3
  
  # Disallow common patterns
  disallow_patterns:
    # Keyboard patterns (qwerty, 12345, etc.)
    keyboard_patterns: true
    # Repeated characters (aaa, 111)
    repeated_chars: true
    max_repeated: 3
    # Sequential characters (abc, 123)
    sequential_chars: true
    max_sequential: 3
    # User info in password (username, email)
    user_info: true
  
  # Custom banned words/patterns (regex supported)
  banned_patterns:
    - "password"
    - "aegion"
    - "admin"
    - "letmein"
    - "welcome"
    - "\\d{4}-\\d{2}-\\d{2}"  # Date patterns

  # Entropy-based validation (alternative to character rules)
  entropy:
    enabled: false
    min_bits: 50  # Minimum entropy bits required

# ─────────────────────────────────────────────────────────────────────────────
# Have I Been Pwned (HIBP) Integration
# ─────────────────────────────────────────────────────────────────────────────
hibp:
  # Enable HIBP password checking
  enabled: true
  
  # API endpoint (uses k-Anonymity, only 5 char prefix of hash sent)
  api_url: "https://api.pwnedpasswords.com/range"
  
  # Request timeout
  timeout: 5s
  
  # Behavior when HIBP API is unavailable
  # Options: "allow" (permit password), "deny" (reject password), "warn" (log only)
  on_error: "warn"
  
  # Minimum number of breaches to reject password
  # Set higher to only block severely compromised passwords
  min_breach_count: 1
  
  # Cache HIBP responses to reduce API calls
  cache:
    enabled: true
    ttl: 24h
    max_entries: 10000
  
  # Rate limiting for HIBP requests
  rate_limit:
    requests_per_second: 10
    burst: 20

# ─────────────────────────────────────────────────────────────────────────────
# Password History
# ─────────────────────────────────────────────────────────────────────────────
history:
  # Enable password history checking
  enabled: true
  
  # Number of previous passwords to remember
  count: 5
  
  # Minimum time between password changes (prevent rapid cycling)
  min_age: 0  # 0 = no minimum (set to "1d" to require 1 day between changes)
  
  # Maximum password age (force password change)
  max_age: 0  # 0 = never expires (set to "90d" for 90-day rotation)
  
  # Warn user before password expires
  expiry_warning: 14d
  
  # Allow similar passwords (differ by only a few characters)
  allow_similar: false
  similarity_threshold: 0.8  # 80% similar = rejected

# ─────────────────────────────────────────────────────────────────────────────
# Password Hashing
# ─────────────────────────────────────────────────────────────────────────────
hashing:
  # Algorithm: "bcrypt", "argon2id", "scrypt"
  algorithm: bcrypt
  
  # Bcrypt configuration
  bcrypt:
    cost: 12  # Work factor (10-14 recommended)
  
  # Argon2id configuration (if using argon2id)
  argon2id:
    memory: 65536      # Memory in KB (64 MB)
    iterations: 3      # Time cost
    parallelism: 4     # Parallel threads
    salt_length: 16    # Salt length in bytes
    key_length: 32     # Derived key length
  
  # Scrypt configuration (if using scrypt)
  scrypt:
    n: 32768           # CPU/memory cost (2^15)
    r: 8               # Block size
    p: 1               # Parallelization
    key_length: 32

  # Automatic rehashing when algorithm/cost changes
  auto_rehash: true

# ─────────────────────────────────────────────────────────────────────────────
# Password Reset Flow
# ─────────────────────────────────────────────────────────────────────────────
reset:
  # Enable password reset functionality
  enabled: true
  
  # Reset token configuration
  token:
    length: 32
    charset: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"
    lifespan: 1h
  
  # Rate limiting for reset requests (per email)
  rate_limit:
    requests: 3
    period: 1h
  
  # Require current password for authenticated password change
  require_current_password: true
  
  # Invalidate all sessions after password change
  invalidate_sessions: true
  
  # Send notification email after password change
  notify_on_change: true

# ─────────────────────────────────────────────────────────────────────────────
# Login Security
# ─────────────────────────────────────────────────────────────────────────────
login:
  # Maximum failed login attempts before lockout
  max_attempts: 5
  
  # Lockout duration after max attempts
  lockout_duration: 15m
  
  # Progressive lockout (doubles each time)
  progressive_lockout:
    enabled: true
    multiplier: 2
    max_duration: 24h
  
  # CAPTCHA after failed attempts
  captcha:
    enabled: false
    threshold: 3  # Show CAPTCHA after 3 failed attempts
    provider: "recaptcha"  # recaptcha, hcaptcha, turnstile
  
  # Notify user of failed login attempts
  notify_failed_attempts:
    enabled: true
    threshold: 3  # Notify after 3 failed attempts
  
  # Require re-authentication for sensitive operations
  sensitive_operations:
    reauth_required: true
    reauth_timeout: 5m
    operations:
      - password_change
      - email_change
      - mfa_disable
      - account_delete

# ─────────────────────────────────────────────────────────────────────────────
# UI/UX Settings
# ─────────────────────────────────────────────────────────────────────────────
ui:
  # Show password strength indicator
  strength_indicator: true
  
  # Real-time validation feedback
  realtime_validation: true
  
  # Show/hide password toggle
  show_password_toggle: true
  
  # Password generator suggestions
  password_generator:
    enabled: true
    default_length: 16
    include_special: true

# ─────────────────────────────────────────────────────────────────────────────
# Audit & Compliance
# ─────────────────────────────────────────────────────────────────────────────
audit:
  # Log password-related events
  log_events:
    - password_created
    - password_changed
    - password_reset_requested
    - password_reset_completed
    - login_success
    - login_failed
    - account_locked
    - account_unlocked
  
  # Retention period for audit logs
  retention: 90d
  
  # Include IP address in logs
  include_ip: true
  
  # Include user agent in logs
  include_user_agent: true
